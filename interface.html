<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PROTOCOLO_32_OS</title>
    <style>
        :root { --red: #ff0000; --dark: #0a0000; --glow: #500000; }
        body, html { background: var(--dark); margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', monospace; color: var(--red); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 3px, 3px 100%; z-index: 1000; pointer-events: none; }
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.25; filter: blur(0.5px); }
        .terminal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; height: 88%; background: rgba(5, 0, 0, 0.95); border: 1px solid var(--red); box-shadow: 0 0 20px var(--glow), inset 0 0 10px #000; z-index: 500; padding: 20px; display: flex; flex-direction: column; border-radius: 4px; }
        .header { display: flex; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid #400; margin-bottom: 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .output { flex-grow: 1; overflow-y: auto; font-size: 14px; line-height: 1.6; padding-right: 10px; }
        .output::-webkit-scrollbar { width: 3px; }
        .output::-webkit-scrollbar-thumb { background: var(--red); }
        .input-line { display: flex; align-items: center; border-top: 1px solid #300; padding-top: 15px; }
        .prompt { margin-right: 12px; color: var(--red); font-weight: bold; }
        input { background: transparent; border: none; color: #fff; width: 100%; font-family: inherit; font-size: 15px; outline: none; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .glitch { animation: shake 0.15s ease-in-out; }
        @keyframes shake { 0% { transform: translate(-50%, -50%) translate(1px, 1px); } 50% { transform: translate(-50%, -50%) translate(-1px, -1px); } 100% { transform: translate(-50%, -50%) translate(0, 0); } }
    </style>
</head>
<body>
<div class="overlay"></div>
<canvas id="matrix-canvas"></canvas>
<div id="p32-terminal" class="terminal">
    <div class="header"><span>> P32_NEURAL_INTERFACE_V5.0</span><span id="sys-clock">00:00:00</span></div>
    <div id="log-box" class="output"></div>
    <div class="input-line"><span class="prompt">[ROOT@P32]:~$</span><input type="text" id="user-input" autofocus autocomplete="off"></div>
</div>

<script>
    const KEY = "AIzaSyDnM0zvDUXPoliNy56NwlS6KSA05w8c4rw"; 

    const logBox = document.getElementById('log-box');
    const userInput = document.getElementById('user-input');
    const term = document.getElementById('p32-terminal');

    // Matrix Rain
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "01X#$@&%*";
    const drops = Array(Math.floor(canvas.width/15)).fill(1);
    function drawMatrix() { ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#400"; ctx.font = "14px monospace"; drops.forEach((y, i) => { ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*15, y*15); if (y*15 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
    setInterval(drawMatrix, 50);
    setInterval(() => document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString(), 1000);

    function write(text, type = 'sys') {
        const div = document.createElement('div');
        div.style.marginBottom = "8px";
        if (type === 'user') div.style.color = "#fff";
        if (type === 'ai') { div.style.borderLeft = "2px solid var(--red)"; div.style.paddingLeft = "10px"; }
        logBox.appendChild(div);
        let i = 0;
        function typeWriter() { if (i < text.length) { div.innerHTML += text.charAt(i); i++; setTimeout(typeWriter, 10); } else { logBox.scrollTop = logBox.scrollHeight; } }
        typeWriter();
    }

    async function callP32(msg) {
        // Endpoint v1 (mais estável para chaves novas)
        const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Responda como Protocolo_32, uma IA hacker. Seja curto e grosso: " + msg }] }] })
            });
            const data = await response.json();
            if (data.error) return "ERRO_SISTEMA: " + data.error.message;
            if (data.candidates) {
                term.classList.add('glitch');
                setTimeout(() => term.classList.remove('glitch'), 200);
                return data.candidates[0].content.parts[0].text;
            }
            return "RESPOSTA_NULA.";
        } catch (e) { return "FALHA_DE_CONEXAO: Verifique sua internet."; }
    }

    userInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const val = userInput.value.trim();
            if (!val) return;
            write("> USUÁRIO: " + val, 'user');
            userInput.value = "";
            write("P32_PROCESSANDO...", "sys");
            const response = await callP32(val);
            logBox.lastChild.remove(); 
            write("P32_RESPONSE: " + response, 'ai');
        }
    });

    window.onload = () => { write(">> PROTOCOLO_32 ONLINE."); write(">> AGUARDANDO COMANDO..."); };
</script>
</body>
</html>

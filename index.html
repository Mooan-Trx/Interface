<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PROTOCOLO_32 | SHADOW-NET</title>
    <style>
        :root { --red: #ff0000; --dark: #020000; --glow: #500000; --text: #ff4444; }
        
        body, html { 
            background: var(--dark); margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Courier New', monospace; color: var(--text);
            text-transform: uppercase;
        }

        .crt-fx {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%; z-index: 5000; pointer-events: none;
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.1; }

        .terminal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 96%; height: 92%; background: rgba(0, 0, 0, 0.98);
            border: 1px solid var(--red); box-shadow: 0 0 50px var(--glow);
            z-index: 1000; padding: 20px; display: flex; flex-direction: column;
        }

        .main-layout { display: flex; flex-grow: 1; overflow: hidden; gap: 15px; }

        .log-area { flex-grow: 1; overflow-y: auto; padding-right: 15px; position: relative; }
        .log-area::-webkit-scrollbar { width: 2px; }
        .log-area::-webkit-scrollbar-thumb { background: var(--red); }

        .side-monitor { width: 280px; display: flex; flex-direction: column; gap: 10px; }

        .panel { border: 1px solid #300; background: rgba(15, 0, 0, 0.8); padding: 8px; font-size: 10px; }
        .panel-title { background: #600; color: #fff; padding: 2px 5px; display: block; margin-bottom: 5px; font-weight: bold; }

        .input-box { display: flex; align-items: center; border-top: 1px solid #400; padding-top: 15px; margin-top: 10px; }
        input { background: transparent; border: none; color: #fff; width: 100%; font-family: inherit; font-size: 16px; outline: none; caret-color: var(--red); }

        /* Animação de Glitch Violento */
        .glitch-heavy { animation: glitch-v 0.2s infinite; filter: hue-rotate(90deg); }
        @keyframes glitch-v {
            0% { transform: translate(-50%, -50%) translate(5px, -5px); }
            50% { transform: translate(-50%, -50%) translate(-5px, 5px); }
            100% { transform: translate(-50%, -50%) translate(0, 0); }
        }

        .cam-sim { width: 100%; height: 100px; background: #000; border: 1px solid #300; position: relative; overflow: hidden; }
        .cam-sim::before { content: "REC ●"; position: absolute; top: 5px; left: 5px; color: red; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .data-stream { font-size: 8px; color: #400; overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body>

<div class="crt-fx"></div>
<canvas id="matrix-canvas"></canvas>

<div id="p32-os" class="terminal">
    <div style="font-size: 10px; border-bottom: 1px solid #400; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between;">
        <span>SYS.KERN: P32-STABLE-8.0</span>
        <span id="uptime">UPTIME: 00:00:00</span>
    </div>

    <div class="main-layout">
        <div id="log" class="log-area"></div>

        <div class="side-monitor">
            <div class="panel">
                <span class="panel-title">SAT-LINK CAM 04</span>
                <div class="cam-sim">
                    <div id="noise" style="width:100%; height:100%; opacity:0.1; background: url(https://media.giphy.com/media/oEI9uWUicKgR6/giphy.gif) center/cover;"></div>
                </div>
            </div>
            <div class="panel">
                <span class="panel-title">SECURE_PROXY_CHAIN</span>
                <div id="proxy-nodes">
                    NODE_1: BRAZIL [OK]<br>
                    NODE_2: RUSSIA [OK]<br>
                    NODE_3: GERMANY [OK]
                </div>
            </div>
            <div class="panel">
                <span class="panel-title">LIVE_TRAFFIC</span>
                <div class="data-stream" id="stream"></div>
            </div>
        </div>
    </div>

    <div class="input-box">
        <span style="color: var(--red); margin-right: 10px;">[P32@SHADOW]:~$</span>
        <input type="text" id="terminal-input" autofocus autocomplete="off">
    </div>
</div>

<script>
    const KEY = "AIzaSyDrH0bKCMQ7OLNrX1ulc3gOj8hf3W7i7tM"; 
    const log = document.getElementById('log');
    const input = document.getElementById('terminal-input');
    const os = document.getElementById('p32-os');

    // Audio Engine
    const aCtx = new (window.AudioContext || window.webkitAudioContext)();
    function sound(f, d, t="square") {
        const o = aCtx.createOscillator(); const g = aCtx.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = 0.01;
        o.connect(g); g.connect(aCtx.destination);
        o.start(); o.stop(aCtx.currentTime + d);
    }

    // Matrix & Stream
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/15)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#200"; ctx.font = "12px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(Math.random() > 0.5 ? "1":"0", i*15, y*15);
            if(y*15 > canvas.height && Math.random() > 0.98) drops[i]=0; drops[i]++;
        });
        document.getElementById('stream').innerText = Math.random().toString(16);
    }
    setInterval(draw, 60);

    function write(text, color = "var(--text)") {
        const d = document.createElement('div');
        d.style.color = color; d.style.marginBottom = "8px";
        log.appendChild(d);
        let i = 0;
        function typing() {
            if(i < text.length) {
                d.innerHTML += text.charAt(i); i++;
                sound(300, 0.01, "sine");
                setTimeout(typing, 15);
            } else { log.scrollTop = log.scrollHeight; }
        }
        typing();
    }

    async function askP32(msg) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
        try {
            const r = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "Você é o Protocolo_32. Responda em PT-BR, seja sarcástico e técnico. " + msg }] }] })
            });
            const d = await r.json();
            return d.candidates[0].content.parts[0].text;
        } catch (e) { return "CONEXÃO PERDIDA."; }
    }

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const v = input.value.trim().toLowerCase(); if(!v) return;
            write("> " + v, "#fff"); input.value = ""; sound(500, 0.05);

            if(v === 'proxy') {
                write(">> RE-ROUTING TRAFFIC...");
                setTimeout(() => write(">> NEW IP: 104.22.19.102 [ESTONIA]", "#0f0"), 1000);
            } else if(v === 'destroy') {
                os.classList.add('glitch-heavy');
                sound(100, 1);
                setTimeout(() => os.classList.remove('glitch-heavy'), 1500);
            } else if(v === 'clear') {
                log.innerHTML = "";
            } else {
                write("P32_THINKING...", "#500");
                const res = await askP32(v);
                log.lastChild.remove();
                write("P32: " + res);
            }
        }
    });

    window.onload = () => {
        write(">> PROTOCOLO_32_SYSTEM_V8.0 BOOTING...");
        write(">> ALL CHANNELS SECURE. TYPE 'DESTROY' OR 'PROXY' FOR ADVANCED FX.");
    };
</script>
</body>
</html>
